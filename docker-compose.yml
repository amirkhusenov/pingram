services:
  mysql:
    image: mysql:8.4
    container_name: pingram-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - app_net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pingram-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8000
      CLIENT_URL: http://166.1.161.201
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
    volumes:
      - chat_storage:/app/storage
    expose:
      - "8000"
    command: sh -c "bunx prisma migrate deploy && bun run index.ts"
    networks:
      - app_net

  fe:
    build:
      context: ./fe
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_GIPHY_API_KEY: ${GIPHY_API_KEY:-}
    container_name: pingram-fe
    restart: unless-stopped
    depends_on:
      - server
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE_URL: http://166.1.161.201/api
      NUXT_PUBLIC_BACKEND_BASE_URL: http://166.1.161.201
    expose:
      - "3000"
    networks:
      - app_net

  nginx:
    image: nginx:1.27-alpine
    container_name: pingram-nginx
    restart: unless-stopped
    depends_on:
      - fe
      - server
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    networks:
      - app_net

  certbot:
    image: certbot/certbot:latest
    container_name: pingram-certbot
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot

volumes:
  mysql_data:
  chat_storage:

networks:
  app_net:
